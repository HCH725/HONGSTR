name: dispatch

on:
  issue_comment:
    types:
      - created

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  dispatch:
    if: >
      github.event.issue.pull_request == null &&
      contains(github.event.comment.body, '/dispatch') &&
      contains(fromJson('["HCH725"]'), github.event.comment.user.login)
    runs-on:
      - self-hosted
      - macOS
      - ARM64
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_EVENT_PATH: ${{ github.event_path }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      DISPATCH_ALLOWLIST: HCH725
      DISPATCH_BASE_BRANCH: main
      AGENT_PROVIDER: ollama
      AGENT_MODEL: gpt-5.3-codex
      OLLAMA_HOST: http://127.0.0.1:11434
      OLLAMA_MODEL: qwen2.5-coder:7b-instruct
      MAX_TOKENS: "4000"
      MAX_COST_USD: "2.00"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Check gh CLI
        shell: bash
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            echo "::error::gh CLI is required on the self-hosted runner for /dispatch"
            exit 1
          fi

      - name: Check out main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Acknowledge dispatch
        shell: bash
        run: |
          gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --body "Dispatch accepted for issue #$ISSUE_NUMBER. Starting guarded dispatcher run."

      - name: Run guarded dispatcher
        shell: bash
        run: |
          bash scripts/dispatch/dispatch_issue.sh
