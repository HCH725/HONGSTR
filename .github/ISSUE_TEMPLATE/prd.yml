name: "PRD — Product Requirements Document"
description: "Describe a problem, context, and desired outcome before any code is written."
labels: ["prd"]
body:
  - type: markdown
    attributes:
      value: |
        ## PRD Template
        Fill out every section. Leave nothing to interpretation.  
        An agent **must not** start implementation until this is approved by a maintainer.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What user/system pain does this solve? Be specific.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context & Background
      description: Why now? What dependencies or prior work is relevant?
    validations:
      required: true

  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
      description: What is explicitly out of scope? This prevents scope creep.
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: |
        List testable, binary criteria. Format:
        ```
        AC1: bash scripts/guardrail_check.sh exits 0
        AC2: git diff origin/main...HEAD -- src/hongstr | wc -l = 0
        AC3: <specific observable behavior>
        ```
    validations:
      required: true

  - type: dropdown
    id: risk
    attributes:
      label: Risk Level
      options:
        - Low (docs/templates only)
        - Medium (scripts/research, no core)
        - High (touches execution semantics)
    validations:
      required: true

  - type: textarea
    id: rollback
    attributes:
      label: Rollback Plan
      description: "How do we undo this? e.g., `git revert <commit>`"
    validations:
      required: true

  - type: checkboxes
    id: red_lines
    attributes:
      label: Red-line Checklist
      options:
        - label: "src/hongstr core diff = 0"
          required: true
        - label: "No subprocess/exec added to tg_cp"
          required: true
        - label: "No data/** artifacts committed"
          required: true
        - label: "No secrets or absolute local paths in docs"
          required: true
