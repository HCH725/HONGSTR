name: "Task — Implementation Checklist"
description: "A concrete, agent-dispatchable implementation unit within an Epic."
labels: ["task"]
body:
  - type: markdown
    attributes:
      value: |
        ## Task Template
        A Task must reference a parent Epic.  
        This is the unit dispatched to an AI agent via `/dispatch`.

  - type: input
    id: epic_ref
    attributes:
      label: Epic Issue Reference
      placeholder: "e.g., #55"
    validations:
      required: true

  - type: textarea
    id: allowed_paths
    attributes:
      label: allowed_paths
      description: |
        **Required for dispatcher.** Exact files this task may touch.
        ```
        allowed_paths:
          - scripts/my_script.py
          - docs/governance/ccpm_adoption.md
        ```
    validations:
      required: true

  - type: textarea
    id: checklist
    attributes:
      label: Implementation Checklist
      description: |
        Step-by-step work. Agent must complete all items before opening PR.
        ```
        - [ ] Step 1
        - [ ] Step 2
        - [ ] Run guardrail_check
        ```
    validations:
      required: true

  - type: textarea
    id: tests
    attributes:
      label: Tests & Verification Commands
      description: |
        Exact commands to verify correctness:
        ```
        bash scripts/guardrail_check.sh
        git diff origin/main...HEAD -- src/hongstr | wc -l  # must be 0
        ```
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: |
        Binary, testable criteria inherited/refined from the PRD.
        ```
        AC1: <command> exits 0
        AC2: <file> contains <pattern>
        ```
    validations:
      required: true

  - type: textarea
    id: rollback
    attributes:
      label: Rollback
      description: "e.g., `git revert <commit_sha>` — must be specific to this task's PR."
    validations:
      required: true

  - type: checkboxes
    id: flags
    attributes:
      label: Special Flags
      options:
        - label: "docs-only (no core diff; may skip core-diff gate)"
        - label: "report_only (research changes; no execution semantics changed)"
        - label: "selfheal (triggered by automated monitoring, not human intent)"
